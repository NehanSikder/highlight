<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Highlight</title>
<meta name="description" content="A calm, typewriter-mode reader that lights one line at a time.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="reader.css">
<meta name="theme-color" content="#14120f">
</head>
<body>

<main id="library" class="screen">
  <header class="lib-head">
    <h1>Highlight</h1>
    <span id="streak" hidden></span>
    <button id="theme-btn" title="Toggle dark mode">☾</button>
  </header>
  <div class="lib-actions">
    <button id="add-btn">+ Add book</button>
    <span class="lib-actions-hint">or drag a file onto the page</span>
  </div>
  <input id="file-input" type="file" accept=".epub,.pdf,.mobi,.azw3,.azw,.prc,.txt,.md,.markdown,.html,.htm,.xhtml,.fb2,.docx" multiple hidden>
  <ul id="book-list"></ul>
  <p id="lib-empty" class="empty" hidden>
    No books yet. Click <strong>+ Add book</strong> — or drag an
    <strong>.epub</strong>, <strong>.pdf</strong>, <strong>.mobi</strong>,
    <strong>.azw3</strong>, <strong>.docx</strong>, <strong>.fb2</strong>,
    <strong>.html</strong>, <strong>.txt</strong>, or <strong>.md</strong>
    file onto this window.
  </p>
  <p class="hint">↓ / j / scroll — next line &nbsp;·&nbsp; ↑ / k — back &nbsp;·&nbsp; c — contents &nbsp;·&nbsp; Esc — library</p>
</main>

<main id="reader" class="screen" hidden>
  <header id="reader-head">
    <button id="toc-btn" title="Contents (c)">☰</button>
    <button id="back-btn" title="Library (Esc)">‹</button>
    <span id="book-title"></span>
    <span id="progress"></span>
  </header>
  <nav id="toc" hidden>
    <h2>Contents</h2>
    <ul id="toc-list"></ul>
  </nav>
  <div id="viewport">
    <div id="text"></div>
  </div>
</main>

<div id="drop-veil" hidden><span>Drop to add book</span></div>
<p id="status" hidden></p>

<script src="vendor/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
